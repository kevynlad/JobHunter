name: JobHunter Pipeline

on:
  schedule:
    # Rodar todos os dias as 08:00 e 18:00 (UTC)
    - cron: '0 8,18 * * *'
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Specific User ID to run (optional — leave blank for all active users)'
        required: false
        type: string

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours max

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          set -eo pipefail
          echo "[$(date -u +'%H:%M:%S')] Upgrading pip..."
          python -m pip install --upgrade pip --progress-bar off
          echo "[$(date -u +'%H:%M:%S')] Installing requirements..."
          pip install --progress-bar off -r requirements.txt 2>&1
          echo "[$(date -u +'%H:%M:%S')] ✅ Dependencies installed."

      - name: Check Environment Health
        env:
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          PYTHONPATH=. python scripts/check_env.py

      - name: Run Pipeline
        env:
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TARGET_USER_ID:       ${{ github.event.inputs.user_id }}
        run: |
          if [ ! -z "$TARGET_USER_ID" ]; then
            echo "Running pipeline for User ID: $TARGET_USER_ID"
          fi
          PYTHONPATH=. python scripts/github_worker.py
