name: 🎯 JobHunter Pipeline

on:
  schedule:
    # Runs at 08:00 and 18:00 BRT (11:00 and 21:00 UTC)
    - cron: '0 11 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  hunt-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -e .

      - name: 📝 Write career summary
        run: echo "${{ secrets.CAREER_SUMMARY }}" > career_summary.txt

      - name: 🗄️ Restore jobs database
        run: |
          if [ -f data/jobs.db ]; then
            echo "Database exists in repo"
          else
            echo "Fresh database will be created"
            mkdir -p data
          fi

      - name: 🔒 Prepare secure RAG documents
        run: |
          mkdir -p data/career
          echo "${{ secrets.MASTER_PROFILE }}" > "data/career/MASTER_PROFILE.md"
          echo "${{ secrets.PRODUCT_OPS_PROFILE }}" > "data/career/product_ops_competencies.md"
          
      - name: 🧠 Build vector database (ChromaDB)
        run: python -m src.rag.ingest

      - name: 🚀 Run pipeline
        env:
          PYTHONUNBUFFERED: "1"
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python -m src.pipeline

      - name: 💾 Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/jobs.db || true
          git add -f output/*.csv || true
          git diff --cached --quiet || git commit -m "chore: update jobs.db and CSV [skip ci]"
          git push || true

      - name: 🌐 Sync database to Railway bot
        env:
          BOT_URL: ${{ secrets.BOT_URL }}
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          if [ -n "$BOT_URL" ] && [ -n "$SYNC_TOKEN" ] && [ -f data/jobs.db ]; then
            echo "Syncing database to $BOT_URL..."
            curl -X POST "$BOT_URL/sync" \
                 -H "Authorization: Bearer $SYNC_TOKEN" \
                 -H "Content-Length: $(stat -c%s data/jobs.db)" \
                 --data-binary @data/jobs.db
            echo -e "\nSync complete!"
          else
            echo "BOT_URL or SYNC_TOKEN not set, or database missing. Skipping sync."
          fi
