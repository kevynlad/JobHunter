[build]
builder = "nixpacks"
# Install the exact minimal bot packages directly. 
# We inline them because Nixpacks hasn't copied requirements-bot.txt during the install phase.
installCmd = "python -m venv /opt/venv && . /opt/venv/bin/activate && pip install python-telegram-bot[job-queue]>=21.0 google-genai>=1.0.0 reportlab>=4.0.0 httpx>=0.27.0 python-dotenv>=1.0.0"

[deploy]
startCommand = "python -m src.bot.main"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
